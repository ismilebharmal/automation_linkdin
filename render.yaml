# Render Blueprint: deploy the FastAPI API from the api/ folder.
# Dashboard: New → Blueprint → connect repo, or create a Web Service manually with the same root/start commands.
services:
  - type: web
    name: content-studio-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
